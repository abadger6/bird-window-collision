# Bird–Window Collision Risk Tool — pilot config.
# Add a new city by dropping a block under `cities:` and switching `active_city`.

# Google Earth Engine settings.
gee:
  # Cloud project registered for Earth Engine (required by GEE since 2024).
  # Find/create yours at: https://console.cloud.google.com/earth-engine
  # Example: "ee-yourname". Leave null to trip a clear error at init time.
  project: "bird-windows"

# GEE + local assets used across all cities.
assets:
  # ALAN — NASA Black Marble daily (gap-filled, moon + atmosphere corrected).
  # ~500 m resolution. Daily; T3 mean-reduces across migration months for a
  # stable seasonal signal. VNP46A3 monthly is NOT in the GEE catalog.
  alan: NASA/VIIRS/002/VNP46A2
  alan_band: Gap_Filled_DNB_BRDF_Corrected_NTL

  # High-resolution ALAN — SDGSAT-1 Glimmer. Scene-based (no Earth Engine
  # ImageCollection). Scenes come from the CBAS Open Science Program at
  # https://www.sdgsat.ac.cn (registration required) and must be downloaded
  # manually into  data/sdgsat/<city>/  (raw .tif files per scene).
  # See docs/sdgsat_alan.md for the "why" and the fusion roadmap.
  alan_hires:
    product: "SDGSAT-1 Glimmer"
    # Band mapping. Panchromatic is a separate 10 m single-band file per
    # scene; RGB comes as a 3-band 40 m file with band 1 = blue (the
    # collision-relevant channel per Tan et al. 2023). Indices are 1-based
    # to match rasterio convention. `product_suffix` is a substring used by
    # scripts/fetch_sdgsat.py to route a file to pan vs. mss.
    bands:
      pan:   {index: 1, nm: [444, 910], resolution_m: 10, product_suffix: "PAN"}
      blue:  {index: 1, nm: [424, 526], resolution_m: 40, product_suffix: "MSS"}
      green: {index: 2, nm: [505, 612], resolution_m: 40, product_suffix: "MSS"}
      red:   {index: 3, nm: [600, 894], resolution_m: 40, product_suffix: "MSS"}
    # Radiometric calibration. Per SDGSAT-1 Glimmer data spec, DN → radiance
    # via:  radiance = DN * scale + offset  (W·m^-2·sr^-1·µm^-1).
    # Placeholders — override from the per-scene metadata XML shipped with
    # each .tif. Conversion is documented in pipeline/alan_hires.py.
    radiometric:
      scale: 1.0
      offset: 0.0
    # Blend stub for a future VIIRS × SDGSAT fusion step (see sdgsat_alan.md
    # "Approach — fusion, not replacement"). Not consumed today; MVP samples
    # both sources in parallel and the risk model picks one via lighting_source.
    blend:
      mode: "parallel"          # {parallel, weighted_mean, fusion_stub}
      viirs_weight: 0.5
      sdgsat_weight: 0.5

# Which migration-months window to composite ALAN over.
# North American spring migration = Apr–May; fall = Sep–Oct.
alan_composite:
  years: [2022, 2023, 2024]
  months: [4, 5, 9, 10]
  reducer: mean

# Which lighting column pipeline/risk.py feeds into the L slot of the index.
#   viirs       — 500 m Black Marble mean composite (default, unchanged behavior)
#   sdgsat_pan  — SDGSAT-1 Glimmer 10 m panchromatic
#   sdgsat_blue — SDGSAT-1 Glimmer 40 m blue band (collision-relevant spectrum)
# When a SDGSAT column is null for a building (outside scene coverage), the
# model falls back to alan_radiance so no building drops out of the ranking.
lighting_source: viirs

# Risk-index weights (§5.2 of the plan). Sum of structure weights = 1.
weights:
  structure:
    facade: 0.5   # w_F: perimeter × height (glass-area proxy)
    area:   0.2   # w_A: footprint area
    height: 0.3   # w_H: sigmoid(building height), see height_response below
  edge: 0.5       # w_E: habitat-edge multiplier magnitude (see habitat below)

# --- Model v2 additions -----------------------------------------------------
# A. Habitat-edge multiplier — collisions concentrate near parks/water/wood
#    (Klem 2009). Exponential decay by distance from building centroid.
habitat:
  osm_tags:
    - {leisure: park}
    - {natural: water}
    - {natural: wood}
  decay_m: 200          # ~1/e drop-off distance in meters

# B. Class multiplier applied to norm(L) — 'empty offices, lights on' effect.
#    Anything not listed → 1.0.
class_multipliers:
  office:      1.30     # Loss et al. 2014
  commercial:  1.20
  retail:      1.20
  education:   1.05
  industrial:  1.00
  residential: 0.80

# C. Nonlinear H response — sigmoid captures the sharp collision-risk rise
#    above ~30 m (Loss 2014, Wang 2020). Midpoint/width in meters.
height_response:
  midpoint_m: 40
  slope_m:    20

# --- Cities ---------------------------------------------------------------
# Switch cities by changing `active_city`. Each city needs:
#   - bbox: full city bounds (WGS84 lon/lat, minx miny maxx maxy)
#   - dev_bbox: small area for iterative pipeline dev (avoids 500k+ polygon downloads)
#   - projected_crs: local projected CRS for accurate area/perimeter in meters
#   - footprints_geojson: path to the manually-fetched Overture GeoJSON
#     (produced by: uv run python scripts/fetch_overture_city.py)
active_city: chicago

cities:
  chicago:
    bbox: [-87.9401, 41.6445, -87.5237, 42.0230]
    # Expanded dev bbox — Loop + Mag Mile + Streeterville + West Loop +
    # South Loop through McCormick Place (CBCM chronic-offender validation
    # target). ~35 km² / est. 10–20k buildings.
    dev_bbox: [-87.6650, 41.8420, -87.6050, 41.9080]
    projected_crs: EPSG:26971  # NAD83 / Illinois East
    footprints_geojson: data/cities/chicago.geojson
    # SDGSAT-1 Glimmer scenes for the migration-months window. Cloud-free
    # night scenes covering the dev bbox — 1–3 is typical (sparse revisit).
    # TODO: populate scene IDs once downloaded. Search the CBAS portal
    # (https://www.sdgsat.ac.cn) with:
    #   Sensor = Glimmer Imager (GIU), Cloud < 10%, Night acquisition,
    #   AOI = Chicago dev_bbox, Date = Apr–May or Sep–Oct 2022–2024.
    # Scene naming follows KX10_GIU_YYYYMMDD_...__PAN.tif /  __MSS.tif;
    # drop files into  data/sdgsat/chicago/  and fetch_sdgsat.py picks them up.
    sdgsat_scenes: []

# --- Output ---------------------------------------------------------------
output:
  local_dir: ./data
